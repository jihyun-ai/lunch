<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스터디 참석 신청</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
  }

  /* ADMIN VIEW */
  #admin-panel {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }

  .admin-header {
    background: #1a1a2e;
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .admin-header h1 { font-size: 1.05rem; font-weight: 700; }
  .admin-header .sub { font-size: 0.78rem; opacity: 0.55; margin-top: 3px; }

  .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn-admin {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .btn-reset { background: #e74c3c; color: white; }
  .btn-export { background: #27ae60; color: white; }
  .btn-toggle { background: rgba(255,255,255,0.15); color: white; }
  .btn-toggle:hover { background: rgba(255,255,255,0.25); }

  .admin-body { padding: 20px; flex: 1; }

  .summary-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .card .num { font-size: 2rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .card .lbl { font-size: 0.72rem; color: #888; font-weight: 500; }
  .card.total .num { color: #1a1a2e; }
  .card.eating .num { color: #27ae60; }
  .card.skip .num { color: #e74c3c; }

  .list-section {
    background: white;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .list-hd {
    padding: 16px 20px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.85rem;
    font-weight: 700;
    color: #444;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .list-hd span { color: #aaa; font-weight: 400; font-size: 0.8rem; }

  .p-row {
    display: flex;
    align-items: center;
    padding: 13px 20px;
    border-bottom: 1px solid #fafafa;
    gap: 10px;
  }

  .p-row:last-child { border-bottom: none; }

  .row-num {
    width: 24px; height: 24px;
    background: #f0f4f8;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: #888;
    flex-shrink: 0;
  }

  .row-name { flex: 1; font-size: 0.9rem; font-weight: 700; color: #222; }

  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .badge.eat { background: #e8f8ef; color: #27ae60; }
  .badge.skip { background: #fdecea; color: #e74c3c; }

  .row-time { font-size: 0.7rem; color: #bbb; }

  .btn-del {
    background: none; border: none;
    cursor: pointer; color: #ddd;
    font-size: 0.95rem; padding: 2px 4px;
    transition: color 0.15s; line-height: 1;
  }

  .btn-del:hover { color: #e74c3c; }

  .empty-state {
    padding: 48px 20px;
    text-align: center;
    color: #bbb;
    font-size: 0.85rem;
  }

  /* USER VIEW */
  #user-panel {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .form-card {
    background: white;
    border-radius: 24px;
    padding: 36px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }

  .form-top { text-align: center; margin-bottom: 28px; }
  .form-icon { font-size: 2.8rem; margin-bottom: 12px; display: block; }

  .form-title {
    font-size: 1.2rem; font-weight: 700;
    color: #1a1a2e; margin-bottom: 8px; line-height: 1.4;
  }

  .form-desc { font-size: 0.82rem; color: #888; line-height: 1.65; }

  .form-group { margin-bottom: 20px; }

  .field-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    color: #555;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #eee;
    border-radius: 12px;
    font-size: 1rem;
    font-family: inherit;
    color: #1a1a2e;
    outline: none;
    transition: border-color 0.2s;
    background: #fafafa;
  }

  input[type="text"]:focus { border-color: #5c6bc0; background: white; }

  .radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .radio-option input[type="radio"] { display: none; }

  .radio-option .rl {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 16px 12px;
    border: 2px solid #eee;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafafa;
    font-size: 0.85rem;
    font-weight: 600;
    color: #666;
  }

  .radio-option .rl .ri { font-size: 1.6rem; }

  .radio-option input[type="radio"]:checked + .rl {
    border-color: #5c6bc0;
    background: #eef0fc;
    color: #3949ab;
  }

  .radio-option.skip-opt input[type="radio"]:checked + .rl {
    border-color: #ef9a9a;
    background: #fdecea;
    color: #c62828;
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #5c6bc0, #3949ab);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
  }

  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(92,107,192,0.35); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .admin-link-btn {
    margin-top: 20px;
    text-align: center;
    font-size: 0.72rem;
    color: #ccc;
    cursor: pointer;
    user-select: none;
  }

  .admin-link-btn:hover { color: #999; }

  #success-view { display: none; text-align: center; padding: 32px 0; }
  .success-icon { font-size: 3.5rem; margin-bottom: 14px; }
  .success-title { font-size: 1.25rem; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
  .success-sub { font-size: 0.84rem; color: #888; line-height: 1.65; white-space: pre-line; }

  .back-btn {
    margin-top: 22px;
    padding: 12px 24px;
    background: #f0f0f0;
    border: none;
    border-radius: 10px;
    font-size: 0.84rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    color: #555;
  }

  .back-btn:hover { background: #e4e4e4; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal-box {
    background: white;
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%;
    max-width: 300px;
    text-align: center;
  }

  .modal-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
  .modal-box p { font-size: 0.8rem; color: #888; margin-bottom: 18px; }

  .modal-box input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #eee;
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 0.2em;
  }

  .modal-box input:focus { border-color: #5c6bc0; }

  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button {
    flex: 1; padding: 12px;
    border: none; border-radius: 10px;
    font-size: 0.85rem; font-weight: 700;
    font-family: inherit; cursor: pointer;
  }

  .modal-btns .cancel-btn { background: #f0f0f0; color: #666; }
  .modal-btns .confirm-btn { background: #1a1a2e; color: white; }

  .pw-error { font-size: 0.75rem; color: #e74c3c; margin: -4px 0 8px; display: none; }

  .closed-banner {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 12px;
    padding: 11px 14px;
    font-size: 0.8rem;
    color: #856404;
    text-align: center;
    margin-bottom: 18px;
    display: none;
  }

  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #27ae60;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  .status-dot.closed { background: #e74c3c; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
</style>
</head>
<body>

<!-- Password Modal -->
<div class="modal-overlay" id="adminModal">
  <div class="modal-box">
    <h3>🔐 관리자 확인</h3>
    <p>관리자 비밀번호를 입력해주세요</p>
    <input type="password" id="pwInput" placeholder="••••" maxlength="10" />
    <div class="pw-error" id="pwError">비밀번호가 틀렸습니다.</div>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">취소</button>
      <button class="confirm-btn" onclick="checkPw()">확인</button>
    </div>
  </div>
</div>

<!-- USER PANEL -->
<div id="user-panel">
  <div class="form-card">
    <div id="form-view">
      <div class="form-top">
        <span class="form-icon">🥗</span>
        <div class="form-title">내일 스터디 참석 신청</div>
        <div class="form-desc">내일 점심 샐러드 주문을 위해<br>미리 참석 여부를 남겨주세요 😊</div>
      </div>

      <div class="closed-banner" id="closedBanner">⚠️ 현재 신청이 마감되었습니다.</div>

      <div class="form-group">
        <span class="field-label">이름</span>
        <input type="text" id="nameInput" placeholder="홍길동" maxlength="10" />
      </div>

      <div class="form-group">
        <span class="field-label">점심 식사 여부</span>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" name="lunch" id="opt-eat" value="eat" checked />
            <div class="rl" onclick="document.getElementById('opt-eat').checked=true">
              <span class="ri">🥗</span>
              점심 먹어요
            </div>
          </div>
          <div class="radio-option skip-opt">
            <input type="radio" name="lunch" id="opt-skip" value="skip" />
            <div class="rl" onclick="document.getElementById('opt-skip').checked=true">
              <span class="ri">🙅</span>
              점심 패스
            </div>
          </div>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitForm()">신청 완료</button>
    </div>

    <div id="success-view">
      <div class="success-icon" id="sEmoji">✅</div>
      <div class="success-title" id="sTitle">신청 완료!</div>
      <div class="success-sub" id="sSub">참석 신청이 접수됐어요.\n내일 스터디에서 봬요! 😄</div>
      <button class="back-btn" onclick="backToForm()">다시 입력하기</button>
    </div>

    <div class="admin-link-btn" onclick="openModal()">관리자</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="statusDot" class="status-dot"></span>
        <h1>스터디 참석 현황</h1>
      </div>
      <div class="sub" id="statusLabel">신청 받는 중</div>
    </div>
    <div class="admin-actions">
      <button class="btn-admin btn-toggle" id="toggleBtn" onclick="toggleOpen()">마감하기</button>
      <button class="btn-admin btn-export" onclick="exportCSV()">📥 명단 저장</button>
      <button class="btn-admin btn-reset" onclick="resetAll()">🗑️ 초기화</button>
      <button class="btn-admin btn-toggle" onclick="goUser()">← 신청 페이지</button>
    </div>
  </div>

  <div class="admin-body">
    <div class="summary-cards">
      <div class="card total"><div class="num" id="totalCount">0</div><div class="lbl">전체 참석</div></div>
      <div class="card eating"><div class="num" id="eatCount">0</div><div class="lbl">🥗 점심 먹어요</div></div>
      <div class="card skip"><div class="num" id="skipCount">0</div><div class="lbl">🙅 점심 패스</div></div>
    </div>

    <div class="list-section">
      <div class="list-hd">참석자 명단 <span id="listCount">0명</span></div>
      <div id="pList"><div class="empty-state">아직 신청한 사람이 없어요</div></div>
    </div>
  </div>
</div>

<script>
  const ADMIN_PW = '1234';

  let participants = [];
  let isOpen = true;

  try {
    const saved = localStorage.getItem('studyData');
    if (saved) {
      const d = JSON.parse(saved);
      participants = d.participants || [];
      isOpen = d.isOpen !== undefined ? d.isOpen : true;
    }
  } catch(e) {}

  function persist() {
    try { localStorage.setItem('studyData', JSON.stringify({ participants, isOpen })); } catch(e) {}
  }

  // ── MODAL ──
  function openModal() {
    document.getElementById('adminModal').classList.add('open');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').style.display = 'none';
    setTimeout(() => document.getElementById('pwInput').focus(), 80);
  }

  function closeModal() {
    document.getElementById('adminModal').classList.remove('open');
  }

  document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });

  function checkPw() {
    if (document.getElementById('pwInput').value === ADMIN_PW) {
      closeModal();
      showAdmin();
    } else {
      document.getElementById('pwError').style.display = 'block';
      document.getElementById('pwInput').value = '';
    }
  }

  // ── VIEWS ──
  function showAdmin() {
    document.getElementById('user-panel').style.display = 'none';
    const ap = document.getElementById('admin-panel');
    ap.style.display = 'flex';
    renderAdmin();
  }

  function goUser() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('user-panel').style.display = 'flex';
    updateBanner();
  }

  function updateBanner() {
    const banner = document.getElementById('closedBanner');
    const btn = document.getElementById('submitBtn');
    banner.style.display = isOpen ? 'none' : 'block';
    btn.disabled = !isOpen;
  }

  // ── FORM ──
  function submitForm() {
    if (!isOpen) return;
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      const inp = document.getElementById('nameInput');
      inp.style.borderColor = '#e74c3c';
      inp.focus();
      setTimeout(() => inp.style.borderColor = '#eee', 1500);
      return;
    }

    const lunch = document.querySelector('input[name="lunch"]:checked').value;
    const now = new Date();
    const time = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    participants.push({ name, lunch, time, id: Date.now() });
    persist();

    document.getElementById('form-view').style.display = 'none';
    const sv = document.getElementById('success-view');
    sv.style.display = 'block';

    if (lunch === 'skip') {
      document.getElementById('sEmoji').textContent = '👍';
      document.getElementById('sSub').textContent = '참석 신청이 접수됐어요.\n점심은 따로 드시는군요! 😊';
    } else {
      document.getElementById('sEmoji').textContent = '✅';
      document.getElementById('sSub').textContent = '참석 신청이 접수됐어요.\n내일 스터디에서 봬요! 😄';
    }
  }

  function backToForm() {
    document.getElementById('nameInput').value = '';
    document.getElementById('opt-eat').checked = true;
    document.getElementById('form-view').style.display = 'block';
    document.getElementById('success-view').style.display = 'none';
  }

  // ── ADMIN ──
  function renderAdmin() {
    const eat = participants.filter(p => p.lunch === 'eat').length;
    const skip = participants.filter(p => p.lunch === 'skip').length;

    document.getElementById('totalCount').textContent = participants.length;
    document.getElementById('eatCount').textContent = eat;
    document.getElementById('skipCount').textContent = skip;
    document.getElementById('listCount').textContent = participants.length + '명';

    const dot = document.getElementById('statusDot');
    const lbl = document.getElementById('statusLabel');
    const tb = document.getElementById('toggleBtn');

    dot.className = 'status-dot' + (isOpen ? '' : ' closed');
    lbl.textContent = isOpen ? '신청 받는 중' : '신청 마감됨';
    tb.textContent = isOpen ? '마감하기' : '다시 열기';

    const pl = document.getElementById('pList');
    if (!participants.length) {
      pl.innerHTML = '<div class="empty-state">아직 신청한 사람이 없어요</div>';
      return;
    }

    pl.innerHTML = participants.map((p, i) => `
      <div class="p-row">
        <div class="row-num">${i + 1}</div>
        <div class="row-name">${p.name}</div>
        <span class="badge ${p.lunch === 'eat' ? 'eat' : 'skip'}">
          ${p.lunch === 'eat' ? '🥗 먹어요' : '🙅 패스'}
        </span>
        <div class="row-time">${p.time}</div>
        <button class="btn-del" onclick="del(${p.id})">✕</button>
      </div>
    `).join('');
  }

  function toggleOpen() {
    isOpen = !isOpen;
    persist();
    renderAdmin();
  }

  function del(id) {
    participants = participants.filter(p => p.id !== id);
    persist();
    renderAdmin();
  }

  function resetAll() {
    if (confirm('명단을 전부 초기화할까요?')) {
      participants = [];
      persist();
      renderAdmin();
    }
  }

  function exportCSV() {
    if (!participants.length) { alert('명단이 없어요!'); return; }
    const today = new Date().toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }).replace(/\s|\./g, '');
    let csv = '\uFEFF번호,이름,점심여부,신청시간\n';
    participants.forEach((p, i) => {
      csv += `${i + 1},${p.name},${p.lunch === 'eat' ? '점심 먹어요' : '점심 패스'},${p.time}\n`;
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `스터디명단_${today}.csv`;
    a.click();
  }

  updateBanner();
</script>
</body>
</html>
